<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Bright & Early — yesterday's good news</title>
    <meta name="description" content="A daily morning newspaper of genuinely positive news from around the world." />
    <meta name="theme-color" content="#fcfbf8" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="icon" href="/icons/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Bright & Early" />
    <meta property="og:title" content="Bright & Early — yesterday's good news" />
    <meta property="og:description" content="A daily morning newspaper of genuinely positive news from around the world. Read it, smile, close it." />
    <meta property="og:image" content="https://brightandearly.news/icons/icon-512.png" />
    <meta property="og:url" content="https://brightandearly.news/" />
    <meta name="twitter:card" content="summary" />

    <link rel="stylesheet" href="/styles.css" />
    <!-- Apply any saved theme before first paint to avoid a flash. -->
    <script>try{var t=localStorage.getItem('theme');if(t)document.documentElement.dataset.theme=t;}catch(e){}</script>
  </head>
  <body>
    <div class="progress" aria-hidden="true"><div class="progress__bar" id="progress"></div></div>
    <header class="topbar">
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light or dark theme" title="Light / dark">🌙</button>
      <div class="topbar__head">
        <h1 class="masthead">Bright &amp; Early</h1>
        <p class="dateline">
          <span id="edition-date">—</span>
          <span class="dateline__sep">·</span>
          <span>Morning Edition</span>
        </p>
      </div>
      <nav class="tabs" id="tabs" aria-label="Sections"></nav>
    </header>

    <main class="pager" id="pager" aria-live="polite">
      <p class="loading">Setting the type…</p>
    </main>

    <footer class="navbar">
      <button class="navbtn" id="prev" aria-label="Previous page" disabled>‹</button>
      <span class="navstatus" id="page-status"></span>
      <button class="navbtn" id="next" aria-label="Next page">›</button>
    </footer>

    <script src="/app.js" type="module"></script>
  </body>
</html>
