name: Daily edition

# Builds tomorrow morning's edition and publishes it to GitHub Pages.
on:
  schedule:
    - cron: "0 11 * * *" # 11:00 UTC daily ≈ early morning in the Americas
  workflow_dispatch: {} # let you trigger a build by hand
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

# Only one publish at a time; let a new run supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Auto-create the Pages site on first run so you don't have to flip the
      # Settings → Pages source by hand.
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build the edition
        run: npm run build
        env:
          # All optional — sources/curation without a key are skipped/fall back.
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
