name: Daily edition

# Builds tomorrow morning's edition and publishes it to GitHub Pages.
on:
  schedule:
    # 10:23 UTC ≈ 6:23 AM US Eastern — built/emailed before North America wakes.
    # Minute 23 (not :00) on purpose: GitHub delays/drops scheduled runs at the
    # top of the hour under load, so an off-peak minute fires more reliably.
    # (Cron is fixed UTC, so in winter/EST this lands an hour earlier, ~5:23 ET.)
    - cron: "23 10 * * *"
  workflow_dispatch: # trigger a build by hand
    inputs:
      send_newsletter:
        description: "Also email the edition to Buttondown subscribers (use when the morning cron missed)"
        type: boolean
        default: false
  push:
    branches: [main, master]

permissions:
  contents: write # commit the generated edition back to the repo (archive)
  pages: write
  id-token: write

# Only one publish at a time; let a new run supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build the edition
        run: npm run build
        env:
          # All optional — sources/curation without a key are skipped/fall back.
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}

      - uses: actions/upload-pages-artifact@v5
        with:
          path: public

      # Email the edition to subscribers — ONLY on the daily schedule (never on
      # pushes), and only if a Buttondown key is configured (else it no-ops).
      - name: Send the morning newsletter
        # Auto on the daily schedule; on a manual run only if you opt in (handy
        # when the cron missed and you want subscribers to still get the edition).
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.send_newsletter)
        run: node scripts/send-newsletter.mjs
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          TIP_URL: ${{ vars.TIP_URL }}

      # Send a ready-to-paste X post to Telegram so it can be posted by hand.
      # No-ops without the bot token/chat id.
      - name: Send the daily X post to Telegram
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: node scripts/x-post.mjs
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      # Persist the generated edition + story pages back to the repo so past
      # editions accumulate into a permanent, browsable archive and old share
      # links keep working. [skip ci] stops this commit re-triggering the run.
      # Skipped on plain code pushes (the data is already committed locally then).
      - name: Archive the edition to the repo
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data public/s public/sitemap.xml
          if git diff --cached --quiet; then
            echo "Nothing new to archive."
          else
            git commit -m "Archive $(date -u +%F) edition [skip ci]"
            git push
          fi

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
